<!-- ===== RECRUITERS PAGE ===== -->
<main class="applications-wrap">
  <div class="container">
    <div class="page-header">
      <h1>Manage Recruiters</h1>
      <p>View and verify recruiter accounts</p>
    </div>

    <div class="applications-grid">
      <div class="applications-main">
        <div class="search-filter-bar">
          <div class="search-filter-grid">
            <div class="search-field">
              <label>Search Recruiters</label>
              <input type="text" placeholder="Search by company or name" />
            </div>
            <div class="filter-field">
              <label>Status</label>
              <select>
                <option value="all">All Status</option>
                <option value="verified">Verified</option>
                <option value="pending">Pending</option>
              </select>
            </div>
          </div>
        </div>

        <div class="applications-list" id="recruitersList"></div>
      </div>
    </div>
  </div>
</main>

<script src="../js/common.js"></script>
